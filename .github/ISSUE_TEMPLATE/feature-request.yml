name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Why is this useful?
      description: How would this help your work with Egyptian hieroglyphs?
    validations:
      required: false
